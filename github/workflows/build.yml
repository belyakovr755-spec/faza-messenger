name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Tools
        run: pip install flet telethon
      - name: Build APK
        run: flet build apk
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: faza-app
          path: build/apk/*.apk
          
