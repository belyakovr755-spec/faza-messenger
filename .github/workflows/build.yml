name: Build APK
on: push
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install flet telethon
      - name: Build APK
        run: flet build apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: faza-app
          path: build/apk/*.apk
          
