name: Build
on: push
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install flet telethon
      - run: flet build apk
      - uses: actions/upload-artifact@v4
        with:
          name: faza-app
          path: build/apk/*.apk
          
