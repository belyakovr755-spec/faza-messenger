name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet telethon
      - name: Initialize Flet project
        run: flet create . 
      - name: Build APK
        # МЫ ДОБАВИЛИ ЭТУ СТРОКУ (указываем архитектуру arm64)
        run: flet build apk --target-platform android-arm64 --yes
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/**/*.apk
          
