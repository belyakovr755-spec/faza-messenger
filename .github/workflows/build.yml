name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      # Настройка Android SDK — это критически важно для Flutter
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34"
      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-cli telethon
      # Убираем флаг --no-interactive, чтобы не было ошибки exit code 2
      - name: Build APK
        run: |
          flet build apk
      - name: Upload APK
        uses: actions/artifacts-upload@v4
        with:
          name: app-release
          path: build/apk/app-release.apk
          
